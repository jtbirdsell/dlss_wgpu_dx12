name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cheap, platform-agnostic policy gates. These never compile the crate (the Windows-only
  # `compile_error!` and `build.rs`/bindgen are not invoked by `fmt`/`metadata`), so they run on a
  # fast Linux runner and fail in seconds rather than after the heavy Windows build.
  lint:
    name: fmt / supply-chain (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # `cargo fmt --check` only parses; no DLSS SDK / libclang / build needed.
      - name: rustfmt
        run: cargo fmt --all --check

      # cargo-deny enforces the supply-chain policy in deny.toml: the RUSTSEC advisory scan, the
      # license allowlist, and — load-bearing for this crate — the [sources] allowlist that pins the
      # only permitted git source to the jtbirdsell/wgpu fork. It resolves the graph via
      # `cargo metadata` (which fetches the git dep) but never builds it.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny check

  windows:
    name: check / clippy / build (windows)
    # Target the VS2026-based image directly to avoid the in-progress 2025 -> 2025-vs2026 redirect.
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install LLVM (libclang, for bindgen)
        run: choco install llvm --no-progress -y

      # Cache the cargo registry + git sources + target dir. The dependency graph is heavy (the
      # git-cloned wgpu fork, the full windows crate, bindgen), so a cold rebuild costs minutes per
      # run. Keyed on Cargo.lock + the job; handles the git-dependency source cache.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # wgpu is resolved straight from the pinned jtbirdsell/wgpu fork (rev d81d755) by Cargo.toml —
      # it already carries the dx12 raw_command_list accessor (gfx-rs/wgpu#8888) and the Streamline
      # factory-upgrade. There is no [patch]/path override, so the cargo steps below fetch and build
      # the exact wgpu a consumer pins; no local ../wgpu checkout is needed.

      # The NGX headers + import libs come from a clone of NVIDIA/DLSS (uses git-lfs for the libs).
      # PINNED to a specific tag for reproducibility: an unpinned clone tracks the default branch, so
      # an upstream SDK bump could silently change the bindgen output / FFI ABI on an unrelated PR.
      # The crate targets the DLSS 4 / 310.x SDK; re-pin deliberately when moving NGX versions.
      - name: Clone DLSS SDK (pinned)
        run: git clone --depth 1 --branch v310.6.0 https://github.com/NVIDIA/DLSS.git "$env:RUNNER_TEMP\dlss_sdk"

      - name: cargo check
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo check --features ray-reconstruction

      - name: clippy
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo clippy --all-targets --features ray-reconstruction -- -D warnings

      # Frame Generation goes through NVIDIA Streamline, which is loaded at RUNTIME via the
      # interposer (sl.interposer.dll) — nothing from the Streamline SDK is linked at build time.
      # So this only needs the same DLSS_SDK (NGX headers/import libs) + LIBCLANG_PATH as the SR/RR
      # checks above; no STREAMLINE_SDK is required to compile.
      - name: cargo check (frame-generation)
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo check --features frame-generation

      - name: clippy (frame-generation)
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo clippy --all-targets --features frame-generation -- -D warnings

      # The check/clippy steps above only exercise the ray-reconstruction and frame-generation
      # feature sets. Also check the configs a default/edge consumer hits: the default (SR-only)
      # set, the degenerate all-off set, and the dev-overlay feature (never shipped).
      - name: cargo check (feature combinations)
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: |
          cargo check
          cargo check --no-default-features
          cargo check --features debug_overlay

      # Doc-warning gate: this crate is doc-heavy and `#![deny(missing_docs)]`, so a broken
      # intra-doc link or a missing doc would otherwise ship silently. `RUSTDOCFLAGS=-D warnings`
      # turns any rustdoc warning into a failure. Run across the feature sets because the set of
      # in-scope items (and therefore which links resolve) changes with `ray-reconstruction` /
      # `frame-generation`. `--no-deps` documents only this crate (dependency docs are irrelevant
      # to our link/doc warnings and add minutes). This must run on Windows: rustdoc still compiles
      # the crate, so it needs the same DLSS_SDK (bindgen headers) + LIBCLANG_PATH as the build.
      - name: cargo doc (-D warnings, feature sets)
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo doc --no-deps
          cargo doc --no-deps --features ray-reconstruction
          cargo doc --no-deps --features frame-generation

      # Run the headless unit tests. The mock-based Frame-Generation tests never load the interposer,
      # create a wgpu device, or touch a GPU, so they run on a GPU-less CI runner — they need only the
      # same DLSS_SDK (NGX headers/libs for bindgen) + LIBCLANG_PATH the build steps use, and NO
      # STREAMLINE_SDK. The hardware tests in tests/headless.rs are #[ignore]d and stay skipped (no
      # --ignored flag).
      - name: Run headless tests (SR/RR + Frame Generation)
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: |
          cargo test --features ray-reconstruction
          cargo test --features frame-generation
          # Re-run the FG suite in release so the order-enforcement tests prove they do not depend on
          # debug_assert! (which is compiled out of release builds).
          cargo test --features frame-generation --release

      # GitHub runners have no NVIDIA GPU, so the examples are only built/linked here, never run
      # (this links the NGX lib + system libs and validates the bindgen output).
      - name: Build examples (do not run; no NVIDIA GPU on CI)
        shell: pwsh
        env:
          DLSS_SDK: ${{ runner.temp }}\dlss_sdk
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: |
          cargo build --examples --features ray-reconstruction
          cargo build --examples --features frame-generation
