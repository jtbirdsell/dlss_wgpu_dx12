# cargo-deny configuration — the supply-chain gate for this crate.
# https://embarkstudios.github.io/cargo-deny/
#
# This crate deliberately pulls `wgpu` from a non-crates.io git fork (until the raw_command_list
# accessor lands upstream, gfx-rs/wgpu#9613) and drags in a large windows/bindgen graph, so the
# [sources] allowlist below is the load-bearing check: it documents and enforces that the ONLY
# permitted git source is that one fork. Run `cargo deny check` locally; CI runs it on every push.

[advisories]
version = 2
# Security advisories (RUSTSEC) are denied by default; unmaintained/unsound are warnings. Add
# specific advisory ids here with a justification if one must be temporarily tolerated.
ignore = []

[licenses]
version = 2
# The set of licenses present in the resolved graph. Tightened to exactly what the deps use; a new
# dependency with a license not listed here fails CI (a deliberate review gate).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Multiple versions of the same crate are a bloat/security smell; surface them as a warning.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The pinned wgpu fork — the single permitted git source. Remove this once SR/RR move to released
# crates.io wgpu (gfx-rs/wgpu#9613) and only FG keeps a consumer-side patch.
allow-git = ["https://github.com/jtbirdsell/wgpu"]
